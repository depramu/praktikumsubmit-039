<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PraktikumSubmit - Kumpulkan Tugas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #0078D4; /* Warna biru ala Azure */
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #0078D4;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #005A9E;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Form PraktikumSubmit</h2>
    
    <form action="/submit-task" method="POST" enctype="multipart/form-data">
        
        <div class="form-group">
            <label for="nim">NIM</label>
            <input type="text" id="nim" name="nim" required placeholder="Masukkan NIM Anda">
        </div>

        <div class="form-group">
            <label for="name">Nama Lengkap</label>
            <input type="text" id="name" name="name" required placeholder="Masukkan Nama Anda">
        </div>

        <div class="form-group">
            <label for="class_name">Kelas</label>
            <input type="text" id="class_name" name="class_name" required placeholder="Contoh: TI-4A">
        </div>

        <div class="form-group">
            <label for="course">Mata Kuliah</label>
            <input type="text" id="course" name="course" required placeholder="Contoh: Pemrograman Web">
        </div>

        <div class="form-group">
            <label for="file_tugas">Upload File Tugas</label>
            <input type="file" id="file_tugas" name="file_tugas" accept=".pdf,.zip,.docx" required>
        </div>

        <button type="submit">Submit Tugas</button>

    </form>
</div>

</body>
</html>
